name: Java CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Make gradlew Executable
        run: chmod +x ./gradlew


      - name: Run Tests
        run: ./gradlew clean test


      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20


      - name: Verify Allure Report
        if: always()
        run: |
          echo "===== allure-report ====="
          ls -la allure-report || true

          echo "===== allure-history ====="
          ls -la allure-history || true

          test -f allure-history/index.html


      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history


      - name: Deploy Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history


      - name: Report Link
        if: always()
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          REPORT_URL="https://${OWNER}.github.io/${REPO}/"

          echo "Latest report: ${REPORT_URL}"

          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "🔗 ${REPORT_URL}" >> $GITHUB_STEP_SUMMARY